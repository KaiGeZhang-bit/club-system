<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成员管理模块 - 业务流程图</title>
    <style>
        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 1200px;
            width: 100%;
            border-radius: 12px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }
        svg {
            width: 100%;
            height: auto;
        }
        /* 样式定义 */
        .box { fill: #fff; stroke: #333; stroke-width: 2; }
        .box-start { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
        .box-end { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; }
        .box-decision { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
        .line { stroke: #333; stroke-width: 2; fill: none; }
        .text { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 13px; fill: #333; text-anchor: middle; }
        .text-bold { font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>成员管理模块 - 业务流程图</h1>

    <svg viewBox="0 0 1100 900" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <!-- 箭头标记 -->
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
            </marker>
        </defs>

        <!-- 开始节点 -->
        <g transform="translate(550, 30)">
            <rect x="-60" y="-20" width="120" height="40" rx="20" class="box-start"/>
            <text x="0" y="5" class="text text-bold">用户发起请求</text>
        </g>

        <!-- 操作类型判断 -->
        <g transform="translate(550, 120)">
            <polygon points="0,-30 70,0 0,30 -70,0" class="box-decision"/>
            <text x="0" y="5" class="text text-bold">操作类型</text>
        </g>

        <!-- 连线：开始 -> 操作类型 -->
        <line x1="550" y1="50" x2="550" y2="90" class="line" marker-end="url(#arrowhead)"/>

        <!-- 左侧分支：个人中心 -->
        <g transform="translate(180, 210)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">个人资料修改</text>
        </g>
        <line x1="480" y1="120" x2="250" y2="190" class="line" marker-end="url(#arrowhead)"/>
        <text x="340" y="150" class="text">个人中心</text>

        <g transform="translate(180, 300)">
            <polygon points="0,-25 50,0 0,25 -50,0" class="box-decision"/>
            <text x="0" y="5" class="text text-bold">校验旧密码</text>
        </g>
        <line x1="180" y1="230" x2="180" y2="275" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(60, 400)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">返回密码错误</text>
        </g>
        <line x1="130" y1="300" x2="60" y2="380" class="line" marker-end="url(#arrowhead)"/>
        <text x="80" y="340" class="text">失败</text>

        <g transform="translate(300, 400)">
            <rect x="-80" y="-20" width="160" height="40" class="box"/>
            <text x="0" y="5" class="text">更新 sys_user 表字段</text>
        </g>
        <line x1="230" y1="300" x2="300" y2="380" class="line" marker-end="url(#arrowhead)"/>
        <text x="280" y="340" class="text">成功</text>

        <g transform="translate(300, 490)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">返回修改成功</text>
        </g>
        <line x1="300" y1="420" x2="300" y2="470" class="line" marker-end="url(#arrowhead)"/>

        <!-- 中间分支：入社/退社申请 -->
        <g transform="translate(550, 210)">
            <rect x="-80" y="-20" width="160" height="40" class="box"/>
            <text x="0" y="5" class="text">提交入社/退社申请</text>
        </g>
        <line x1="550" y1="150" x2="550" y2="190" class="line" marker-end="url(#arrowhead)"/>
        <text x="580" y="170" class="text">学生</text>

        <g transform="translate(550, 300)">
            <rect x="-80" y="-20" width="160" height="40" class="box"/>
            <text x="0" y="5" class="text">写入 relation/quit 表 status=0</text>
        </g>
        <line x1="550" y1="230" x2="550" y2="280" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(550, 390)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">通知负责人审核</text>
        </g>
        <line x1="550" y1="320" x2="550" y2="370" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(550, 480)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">返回申请提交成功</text>
        </g>
        <line x1="550" y1="410" x2="550" y2="460" class="line" marker-end="url(#arrowhead)"/>

        <!-- 右侧分支：负责人审核 -->
        <g transform="translate(920, 210)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">成员审核管理</text>
        </g>
        <line x1="620" y1="120" x2="850" y2="190" class="line" marker-end="url(#arrowhead)"/>
        <text x="750" y="150" class="text">负责人/老师</text>

        <g transform="translate(920, 300)">
            <polygon points="0,-25 60,0 0,25 -60,0" class="box-decision"/>
            <text x="0" y="5" class="text text-bold">权限校验</text>
        </g>
        <line x1="920" y1="230" x2="920" y2="275" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(770, 400)">
            <rect x="-80" y="-20" width="160" height="40" class="box"/>
            <text x="0" y="5" class="text">返回权限不足</text>
        </g>
        <line x1="860" y1="300" x2="770" y2="380" class="line" marker-end="url(#arrowhead)"/>
        <text x="800" y="340" class="text">无权限</text>

        <g transform="translate(1070, 400)">
            <polygon points="0,-25 50,0 0,25 -50,0" class="box-decision"/>
            <text x="0" y="5" class="text text-bold">审核操作</text>
        </g>
        <line x1="980" y1="300" x2="1070" y2="380" class="line" marker-end="url(#arrowhead)"/>
        <text x="1040" y="340" class="text">有权限</text>

        <g transform="translate(970, 500)">
            <rect x="-90" y="-20" width="180" height="40" class="box"/>
            <text x="0" y="5" class="text">通过：更新 status=1 同步统计</text>
        </g>
        <line x1="1020" y1="425" x2="970" y2="480" class="line" marker-end="url(#arrowhead)"/>
        <text x="1050" y="450" class="text">通过</text>

        <g transform="translate(1170, 500)">
            <rect x="-90" y="-20" width="180" height="40" class="box"/>
            <text x="0" y="5" class="text">驳回：更新 status=2 记录原因</text>
        </g>
        <line x1="1120" y1="425" x2="1170" y2="480" class="line" marker-end="url(#arrowhead)"/>
        <text x="1180" y="450" class="text">驳回</text>

        <g transform="translate(1070, 590)">
            <rect x="-80" y="-20" width="160" height="40" class="box"/>
            <text x="0" y="5" class="text">通知申请人审核结果</text>
        </g>
        <line x1="970" y1="520" x2="1070" y2="570" class="line" marker-end="url(#arrowhead)"/>
        <line x1="1170" y1="520" x2="1070" y2="570" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(1070, 680)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">返回审核结果</text>
        </g>
        <line x1="1070" y1="610" x2="1070" y2="660" class="line" marker-end="url(#arrowhead)"/>

        <!-- 汇聚到结束节点 -->
        <g transform="translate(550, 850)">
            <rect x="-50" y="-20" width="100" height="40" rx="20" class="box-end"/>
            <text x="0" y="5" class="text text-bold">流程结束</text>
        </g>

        <line x1="300" y1="510" x2="500" y2="830" class="line" marker-end="url(#arrowhead)"/>
        <line x1="550" y1="500" x2="550" y2="830" class="line" marker-end="url(#arrowhead)"/>
        <line x1="1070" y1="700" x2="600" y2="830" class="line" marker-end="url(#arrowhead)"/>
        <line x1="60" y1="420" x2="500" y2="830" class="line" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>
        <line x1="770" y1="420" x2="600" y2="830" class="line" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>

    </svg>
</div>
</body>
</html>
