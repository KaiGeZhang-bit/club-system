<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公告管理模块 - 业务流程图</title>
    <style>
        body {
            font-family: "Microsoft YaHei", "SimSun", sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 1100px;
            width: 100%;
            border-radius: 12px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 24px;
        }
        svg {
            width: 100%;
            height: auto;
        }
        .box { fill: #fff; stroke: #333; stroke-width: 2; }
        .box-start { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
        .box-end { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; }
        .box-decision { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
        .line { stroke: #333; stroke-width: 2; fill: none; }
        .text { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 13px; fill: #333; text-anchor: middle; }
        .text-bold { font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h1>公告管理模块 - 业务流程图</h1>

    <svg viewBox="0 0 1100 950" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
            </marker>
        </defs>

        <!-- 开始节点 -->
        <g transform="translate(550, 30)">
            <rect x="-60" y="-20" width="120" height="40" rx="20" class="box-start"/>
            <text x="0" y="5" class="text text-bold">用户发起请求</text>
        </g>

        <!-- 操作类型判断 -->
        <g transform="translate(550, 120)">
            <polygon points="0,-30 60,0 0,30 -60,0" class="box-decision"/>
            <text x="0" y="5" class="text text-bold">操作类型</text>
        </g>

        <!-- 连线：开始 -> 操作类型 -->
        <line x1="550" y1="50" x2="550" y2="90" class="line" marker-end="url(#arrowhead)"/>

        <!-- 左侧分支：发布/编辑公告 -->
        <g transform="translate(180, 210)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">提交公告发布/编辑</text>
        </g>
        <!-- 正交连线 -->
        <path d="M490,120 L180,120 L180,190" class="line" marker-end="url(#arrowhead)"/>
        <text x="300" y="110" class="text">负责人/老师</text>

        <g transform="translate(180, 300)">
            <polygon points="0,-25 50,0 0,25 -50,0" class="box-decision"/>
            <text x="0" y="5" class="text text-bold">权限校验</text>
        </g>
        <line x1="180" y1="230" x2="180" y2="275" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(50, 400)">
            <rect x="-60" y="-20" width="120" height="40" class="box"/>
            <text x="0" y="5" class="text">返回 403 权限不足</text>
        </g>
        <!-- 正交连线绕过中间区域 -->
        <path d="M130,300 L50,300 L50,380" class="line" marker-end="url(#arrowhead)"/>
        <text x="70" y="340" class="text">无权限</text>

        <g transform="translate(310, 400)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">写入 announcement 表</text>
        </g>
        <path d="M230,300 L310,300 L310,380" class="line" marker-end="url(#arrowhead)"/>
        <text x="290" y="340" class="text">有权限</text>

        <g transform="translate(310, 490)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">设置 status=1 已发布</text>
        </g>
        <line x1="310" y1="420" x2="310" y2="470" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(310, 580)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">异步推送社团消息</text>
        </g>
        <line x1="310" y1="510" x2="310" y2="560" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(310, 670)">
            <rect x="-60" y="-20" width="120" height="40" class="box"/>
            <text x="0" y="5" class="text">返回操作成功</text>
        </g>
        <line x1="310" y1="600" x2="310" y2="650" class="line" marker-end="url(#arrowhead)"/>

        <!-- 中间分支：公告下架 -->
        <g transform="translate(550, 210)">
            <rect x="-60" y="-20" width="120" height="40" class="box"/>
            <text x="0" y="5" class="text">公告下架操作</text>
        </g>
        <line x1="550" y1="150" x2="550" y2="190" class="line" marker-end="url(#arrowhead)"/>
        <text x="580" y="170" class="text">负责人</text>

        <g transform="translate(550, 300)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">更新 status=2 已下架</text>
        </g>
        <line x1="550" y1="230" x2="550" y2="280" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(550, 390)">
            <rect x="-60" y="-20" width="120" height="40" class="box"/>
            <text x="0" y="5" class="text">清除相关缓存</text>
        </g>
        <line x1="550" y1="320" x2="550" y2="370" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(550, 480)">
            <rect x="-50" y="-20" width="100" height="40" class="box"/>
            <text x="0" y="5" class="text">返回下架成功</text>
        </g>
        <line x1="550" y1="410" x2="550" y2="460" class="line" marker-end="url(#arrowhead)"/>

        <!-- 右侧分支：公告查询 -->
        <g transform="translate(920, 210)">
            <rect x="-60" y="-20" width="120" height="40" class="box"/>
            <text x="0" y="5" class="text">公告列表查询</text>
        </g>
        <path d="M610,120 L920,120 L920,190" class="line" marker-end="url(#arrowhead)"/>
        <text x="800" y="110" class="text">成员</text>

        <g transform="translate(920, 300)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">按 is_top 降序排列</text>
        </g>
        <line x1="920" y1="230" x2="920" y2="280" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(920, 390)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">过滤已加入社团数据</text>
        </g>
        <line x1="920" y1="320" x2="920" y2="370" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(920, 480)">
            <rect x="-70" y="-20" width="140" height="40" class="box"/>
            <text x="0" y="5" class="text">分页返回公告数据</text>
        </g>
        <line x1="920" y1="410" x2="920" y2="460" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(920, 570)">
            <rect x="-60" y="-20" width="120" height="40" class="box"/>
            <text x="0" y="5" class="text">更新 read_count + 1</text>
        </g>
        <line x1="920" y1="500" x2="920" y2="550" class="line" marker-end="url(#arrowhead)"/>

        <g transform="translate(920, 660)">
            <rect x="-50" y="-20" width="100" height="40" class="box"/>
            <text x="0" y="5" class="text">返回查询结果</text>
        </g>
        <line x1="920" y1="590" x2="920" y2="640" class="line" marker-end="url(#arrowhead)"/>

        <!-- 汇聚到结束节点（采用正交连线从两侧汇入） -->
        <g transform="translate(550, 900)">
            <rect x="-50" y="-20" width="100" height="40" rx="20" class="box-end"/>
            <text x="0" y="5" class="text text-bold">流程结束</text>
        </g>

        <!-- 左侧汇聚线 -->
        <path d="M310,690 L310,750 L500,750 L500,880" class="line" marker-end="url(#arrowhead)"/>
        <!-- 中间汇聚线 -->
        <line x1="550" y1="500" x2="550" y2="880" class="line" marker-end="url(#arrowhead)"/>
        <!-- 右侧汇聚线 -->
        <path d="M920,680 L920,750 L600,750 L600,880" class="line" marker-end="url(#arrowhead)"/>
        <!-- 403 错误汇聚线 -->
        <path d="M50,420 L50,750 L500,750" class="line" marker-end="url(#arrowhead)" stroke-dasharray="5,5"/>

    </svg>
</div>
</body>
</html>
