<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>社团管理模块 - 业务流程图</title>
  <style>
    body {
      font-family: "Microsoft YaHei", "SimSun", sans-serif;
      background: #f5f7fa;
      margin: 0;
      padding: 40px;
      display: flex;
      justify-content: center;
    }
    .container {
      background: white;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      max-width: 1200px;
      width: 100%;
      border-radius: 12px;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 30px;
      font-size: 24px;
    }
    svg {
      width: 100%;
      height: auto;
    }
    /* 样式定义 */
    .box { fill: #fff; stroke: #333; stroke-width: 2; }
    .box-start { fill: #e3f2fd; stroke: #1976d2; stroke-width: 2; }
    .box-end { fill: #e8f5e9; stroke: #388e3c; stroke-width: 2; }
    .box-decision { fill: #fff3e0; stroke: #f57c00; stroke-width: 2; }
    .line { stroke: #333; stroke-width: 2; fill: none; }
    .arrow { marker-end: url(#arrowhead); }
    .text { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 13px; fill: #333; text-anchor: middle; }
    .text-bold { font-weight: bold; }
  </style>
</head>
<body>
<div class="container">
  <h1>社团管理模块 - 业务流程图</h1>

  <svg viewBox="0 0 1100 850" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- 箭头标记 -->
      <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
        <polygon points="0 0, 10 3.5, 0 7" fill="#333" />
      </marker>
    </defs>

    <!-- 开始节点 -->
    <g transform="translate(500, 30)">
      <rect x="-60" y="-20" width="120" height="40" rx="20" class="box-start"/>
      <text x="0" y="5" class="text text-bold">用户发起请求</text>
    </g>

    <!-- 角色判断 -->
    <g transform="translate(500, 110)">
      <polygon points="0,-30 60,0 0,30 -60,0" class="box-decision"/>
      <text x="0" y="5" class="text text-bold">校验角色权限</text>
    </g>

    <!-- 连线：开始 -> 角色判断 -->
    <line x1="500" y1="50" x2="500" y2="80" class="line arrow"/>

    <!-- 左侧分支：学生创建 -->
    <g transform="translate(150, 200)">
      <rect x="-80" y="-20" width="160" height="40" class="box"/>
      <text x="0" y="5" class="text">提交创建社团申请</text>
    </g>
    <line x1="440" y1="110" x2="230" y2="180" class="line arrow"/>
    <text x="330" y="140" class="text">学生</text>

    <g transform="translate(150, 290)">
      <polygon points="0,-25 50,0 0,25 -50,0" class="box-decision"/>
      <text x="0" y="5" class="text text-bold">数据校验</text>
    </g>
    <line x1="150" y1="220" x2="150" y2="265" class="line arrow"/>

    <g transform="translate(50, 390)">
      <rect x="-70" y="-20" width="140" height="40" class="box"/>
      <text x="0" y="5" class="text">返回错误提示</text>
    </g>
    <line x1="100" y1="290" x2="50" y2="370" class="line arrow"/>
    <text x="80" y="330" class="text">不通过</text>

    <g transform="translate(250, 390)">
      <rect x="-80" y="-20" width="160" height="40" class="box"/>
      <text x="0" y="5" class="text">插入 club_info 表 status=0</text>
    </g>
    <line x1="200" y1="290" x2="250" y2="370" class="line arrow"/>
    <text x="240" y="330" class="text">通过</text>

    <g transform="translate(250, 480)">
      <rect x="-70" y="-20" width="140" height="40" class="box"/>
      <text x="0" y="5" class="text">异步通知管理员</text>
    </g>
    <line x1="250" y1="410" x2="250" y2="460" class="line arrow"/>

    <g transform="translate(250, 570)">
      <rect x="-70" y="-20" width="140" height="40" class="box"/>
      <text x="0" y="5" class="text">返回申请成功</text>
    </g>
    <line x1="250" y1="500" x2="250" y2="550" class="line arrow"/>

    <!-- 中间分支：管理员审核 -->
    <g transform="translate(500, 200)">
      <rect x="-80" y="-20" width="160" height="40" class="box"/>
      <text x="0" y="5" class="text">执行社团审核</text>
    </g>
    <line x1="500" y1="140" x2="500" y2="180" class="line arrow"/>
    <text x="520" y="160" class="text">管理员</text>

    <g transform="translate(500, 290)">
      <rect x="-90" y="-20" width="180" height="40" class="box"/>
      <text x="0" y="5" class="text">查询待审核社团列表</text>
    </g>
    <line x1="500" y1="220" x2="500" y2="270" class="line arrow"/>

    <g transform="translate(500, 390)">
      <polygon points="0,-25 50,0 0,25 -50,0" class="box-decision"/>
      <text x="0" y="5" class="text text-bold">审核操作</text>
    </g>
    <line x1="500" y1="310" x2="500" y2="365" class="line arrow"/>

    <g transform="translate(350, 490)">
      <rect x="-90" y="-20" width="180" height="40" class="box"/>
      <text x="0" y="5" class="text">通过：更新 status=1 分配 ID</text>
    </g>
    <line x1="450" y1="390" x2="350" y2="470" class="line arrow"/>
    <text x="380" y="430" class="text">通过</text>

    <g transform="translate(650, 490)">
      <rect x="-90" y="-20" width="180" height="40" class="box"/>
      <text x="0" y="5" class="text">驳回：更新 status=2 记录原因</text>
    </g>
    <line x1="550" y1="390" x2="650" y2="470" class="line arrow"/>
    <text x="620" y="430" class="text">驳回</text>

    <g transform="translate(500, 570)">
      <rect x="-80" y="-20" width="160" height="40" class="box"/>
      <text x="0" y="5" class="text">通知申请人审核结果</text>
    </g>
    <line x1="350" y1="510" x2="500" y2="550" class="line arrow"/>
    <line x1="650" y1="510" x2="500" y2="550" class="line arrow"/>

    <g transform="translate(500, 660)">
      <rect x="-70" y="-20" width="140" height="40" class="box"/>
      <text x="0" y="5" class="text">返回审核结果</text>
    </g>
    <line x1="500" y1="590" x2="500" y2="640" class="line arrow"/>

    <!-- 右侧分支：负责人/老师管理 -->
    <g transform="translate(850, 200)">
      <rect x="-80" y="-20" width="160" height="40" class="box"/>
      <text x="0" y="5" class="text">社团信息管理</text>
    </g>
    <line x1="560" y1="110" x2="770" y2="180" class="line arrow"/>
    <text x="680" y="140" class="text">负责人/老师</text>

    <g transform="translate(850, 290)">
      <polygon points="0,-25 60,0 0,25 -60,0" class="box-decision"/>
      <text x="0" y="5" class="text text-bold">权限校验</text>
    </g>
    <line x1="850" y1="220" x2="850" y2="265" class="line arrow"/>

    <g transform="translate(700, 390)">
      <rect x="-80" y="-20" width="160" height="40" class="box"/>
      <text x="0" y="5" class="text">返回权限不足</text>
    </g>
    <line x1="790" y1="290" x2="700" y2="370" class="line arrow"/>
    <text x="730" y="330" class="text">无权限</text>

    <g transform="translate(1000, 390)">
      <polygon points="0,-25 50,0 0,25 -50,0" class="box-decision"/>
      <text x="0" y="5" class="text text-bold">操作类型</text>
    </g>
    <line x1="910" y1="290" x2="1000" y2="370" class="line arrow"/>
    <text x="970" y="330" class="text">有权限</text>

    <g transform="translate(900, 490)">
      <rect x="-90" y="-20" width="180" height="40" class="box"/>
      <text x="0" y="5" class="text">修改信息：更新 club_info 字段</text>
    </g>
    <line x1="950" y1="415" x2="900" y2="470" class="line arrow"/>
    <text x="970" y="440" class="text">修改</text>

    <g transform="translate(1050, 490)">
      <rect x="-90" y="-20" width="180" height="40" class="box"/>
      <text x="0" y="5" class="text">解散社团：更新 status=2</text>
    </g>
    <line x1="1050" y1="415" x2="1050" y2="470" class="line arrow"/>
    <text x="1090" y="440" class="text">解散</text>

    <g transform="translate(975, 580)">
      <rect x="-80" y="-20" width="160" height="40" class="box"/>
      <text x="0" y="5" class="text">清除 Redis 缓存</text>
    </g>
    <line x1="900" y1="510" x2="975" y2="560" class="line arrow"/>
    <line x1="1050" y1="510" x2="975" y2="560" class="line arrow"/>

    <g transform="translate(975, 660)">
      <rect x="-70" y="-20" width="140" height="40" class="box"/>
      <text x="0" y="5" class="text">返回操作结果</text>
    </g>
    <line x1="975" y1="600" x2="975" y2="640" class="line arrow"/>

    <!-- 汇聚到结束节点 -->
    <g transform="translate(500, 800)">
      <rect x="-50" y="-20" width="100" height="40" rx="20" class="box-end"/>
      <text x="0" y="5" class="text text-bold">流程结束</text>
    </g>

    <line x1="250" y1="590" x2="450" y2="780" class="line arrow"/>
    <line x1="500" y1="680" x2="500" y2="780" class="line arrow"/>
    <line x1="975" y1="680" x2="550" y2="780" class="line arrow"/>
    <line x1="50" y1="410" x2="450" y2="780" class="line arrow" stroke-dasharray="5,5"/>
    <line x1="700" y1="410" x2="550" y2="780" class="line arrow" stroke-dasharray="5,5"/>

  </svg>
</div>
</body>
</html>
